<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>King Orch</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div class="app-container">
    
    <!-- БОКОВАЯ ПАНЕЛЬ С СЕССИЯМИ -->
    <aside class="sidebar">
      <button id="btn-new-session" class="btn-primary">📝 Новая сессия</button>
      <div class="session-list-title">История чатов</div>
      <div id="session-list" class="session-list">
        <!-- Сюда подгружаются сессии -->
      </div>
    </aside>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main class="main-content">
      <div class="tabs">
        <button id="tab-chat" class="tab-btn active">💬 Чат</button>
        <button id="tab-settings" class="tab-btn">⚙️ Настройки</button>
        <button id="tab-logs" class="tab-btn">📝 Логи</button>
      </div>

      <!-- ВКЛАДКА ЧАТА -->
      <div id="view-chat" class="view active chat-layout">
        
        <!-- Окно истории сообщений -->
        <div id="chat-history" class="chat-history">
          <div class="message message-system">
            Система готова. Выберите агента и напишите запрос.
          </div>
        </div>

        <!-- Панель статуса -->
        <div class="feedback" id="chat-feedback" style="display: none;">
          <div class="result-toolbar">
            <div id="status-label" class="status-label">Обработка...</div>
          </div>
          <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
          </div>
        </div>

        <!-- Ввод сообщения и выбор агента/модели -->
        <div class="chat-input-area group-box">
          <textarea id="chat-input" placeholder="Спросите что угодно (Shift+Enter для переноса)..."></textarea>
          
          <div class="chat-input-controls">
            <div class="chat-input-controls-left">
              <select id="agent-select" title="Выбор агента">
                <option value="YouTube_Summary_Agent">YouTube_Summary_Agent</option>
                <!-- Сюда подгружаются видимые агенты из папки agents/ -->
              </select>
              
              <select id="model-select" title="Выбор модели GGUF"></select>
              <button id="btn-add-model" class="btn-secondary" title="Добавить новую модель">+</button>
            </div>
            
            <div class="chat-input-controls-right">
              <button id="btn-stop" class="btn-danger" disabled>⏹ Стоп</button>
              <button id="btn-send" class="btn-primary">Отправить</button>
            </div>
          </div>
        </div>
      </div>

      <!-- СКРЫТЫЙ VIEW ДЛЯ САБЧАТА -->
      <div id="view-subchat" class="view chat-layout">
        <div class="subchat-header">
          <button id="btn-back-chat" class="btn-secondary">⬅ Назад к чату</button>
          <span id="subchat-title">Отчет сабагента</span>
        </div>
        <div id="subchat-history" class="chat-history">
          <!-- Сюда подгружается переписка с сабагентом -->
        </div>
      </div>

      <!-- ВКЛАДКА НАСТРОЕК -->
      <div id="view-settings" class="view">
        
        <div class="group-box">
          <div class="group-title">1. Оформление</div>
          <div class="input-row">
            <label>Тема интерфейса:</label>
            <select id="theme-select">
              <option value="light">Светлая</option>
              <option value="dark">Темная</option>
            </select>
          </div>
        </div>

        <div class="group-box">
          <div class="group-title">2. Продвинутые настройки LLM и Агентов</div>
          <div class="input-row">
            <label>Формат промпта:</label>
            <select id="prompt-format-select" style="flex: 1;">
              <option value="Auto">Автоопределение (по имени файла)</option>
              <option value="ChatML">ChatML (Qwen, Mistral)</option>
              <option value="Gemma">Gemma</option>
              <option value="Llama3">Llama 3</option>
            </select>
          </div>
          <div class="input-row" style="margin-top: 10px;">
            <label for="context-slider" style="min-width: 180px;">Контекст: <strong id="context-value">24576</strong></label>
            <input type="range" id="context-slider" min="4096" max="131072" step="1024" value="24576" style="flex: 1;" />
          </div>
          <div class="input-row" style="margin-top: 10px;">
            <label for="conf-slider" style="min-width: 180px;">Порог уверенности: <strong id="conf-value">0.8</strong></label>
            <input type="range" id="conf-slider" min="0.1" max="1.0" step="0.05" value="0.8" style="flex: 1;" title="Если уверенность агента ниже порога, он прервется и задаст вопрос пользователю." />
          </div>
          <div class="input-row" style="margin-top: 10px;">
            <input type="checkbox" id="chk-kv-quant" />
            <label for="chk-kv-quant">Квантизация KV кэша (Q8_0)</label>
          </div>
        </div>

        <div class="group-box">
          <div class="group-title">3. Настройки YouTube Агента</div>
          <div class="input-row">
            <input type="checkbox" id="chk-timestamps" checked />
            <label for="chk-timestamps">Указывать таймкоды в саммари</label>
          </div>
        </div>
      </div>

      <!-- ВКЛАДКА ЛОГОВ -->
      <div id="view-logs" class="view">
        <div class="group-box" style="flex: 1; display: flex; flex-direction: column; height: 100%;">
          <div class="group-title" style="display: flex; justify-content: space-between;">
            <span>Логи системы</span>
            <button id="btn-clear-logs" class="btn-secondary" style="padding: 2px 8px; font-size: 12px;">Очистить</button>
          </div>
          <textarea id="log-view" readonly placeholder="Здесь будут логи приложения..."></textarea>
        </div>
      </div>

    </main>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
