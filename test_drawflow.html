<!DOCTYPE html>
<html><body>
<div id="graph" style="width:800px;height:600px;border:1px solid #ccc"></div>
<div id="result">Running test...</div>
<script src="node_modules/drawflow/dist/drawflow.min.js"></script>
<script>
function write(msg) {
  document.getElementById('result').insertAdjacentHTML('beforeend', '<div>' + msg + '</div>');
}
function pass(msg) { write('<span style="color:green">[PASS]</span> ' + msg); }
function fail(msg) { write('<span style="color:red">[FAIL]</span> ' + msg); }

const editor = new Drawflow(document.getElementById('graph'));
editor.start();

// ── Test 1: import data with custom string IDs ──
write('<hr><b>Test 1: import with custom IDs</b>');

const importData = {
  drawflow: {
    Home: {
      data: {}
    }
  }
};
const data = importData.drawflow.Home.data;

data['extract_facts'] = {
  id: 'extract_facts', name: 'extract_facts', data: { id: 'extract_facts', type: 'llm_fact_extractor' },
  class: '', html: '', typenode: false,
  inputs: { input_1: { connections: [] } },
  outputs: { output_1: { connections: [] } },
  pos_x: 100, pos_y: 100
};
data['priority_router'] = {
  id: 'priority_router', name: 'priority_router', data: { id: 'priority_router', type: 'switch' },
  class: '', html: '', typenode: false,
  inputs: { input_1: { connections: [] } },
  outputs: { output_1: { connections: [] }, output_2: { connections: [] }, output_3: { connections: [] }, output_4: { connections: [] } },
  pos_x: 400, pos_y: 100
};
data['call_curator'] = {
  id: 'call_curator', name: 'call_curator', data: { id: 'call_curator', type: 'llm_worker', agent: 'curator' },
  class: '', html: '', typenode: false,
  inputs: { input_1: { connections: [] } },
  outputs: { output_1: { connections: [] } },
  pos_x: 700, pos_y: 50
};
data['END'] = {
  id: 'END', name: 'END', data: { id: 'END', type: 'return' },
  class: '', html: '', typenode: false,
  inputs: { input_1: { connections: [] } },
  outputs: {},
  pos_x: 700, pos_y: 250
};

try {
  editor.import(importData);
  pass('import() executed without error');
} catch(e) {
  fail('import() threw: ' + e.message);
}

// ── Test 2: nodes accessible by custom ID ──
write('<hr><b>Test 2: data[customId] accessibility</b>');

const extract = editor.drawflow.drawflow.Home.data['extract_facts'];
if (extract && extract.id === 'extract_facts') {
  pass('data["extract_facts"] exists, id=' + extract.id);
} else {
  fail('data["extract_facts"] is ' + typeof extract);
}

const end = editor.drawflow.drawflow.Home.data['END'];
if (end && end.id === 'END') {
  pass('data["END"] exists, id=' + end.id);
} else {
  fail('data["END"] is ' + typeof end);
}

// ── Test 3: DOM elements exist ──
write('<hr><b>Test 3: DOM elements</b>');

const el1 = document.getElementById('node-extract_facts');
if (el1) {
  pass('DOM #node-extract_facts exists');
} else {
  fail('DOM #node-extract_facts NOT found');
}

const el2 = document.getElementById('node-END');
if (el2) {
  pass('DOM #node-END exists');
} else {
  fail('DOM #node-END NOT found');
}

// ── Test 4: addConnection with custom IDs ──
write('<hr><b>Test 4: addConnection with custom IDs</b>');

try {
  editor.addConnection('extract_facts', 'priority_router', 'output_1', 'input_1');
  pass('addConnection(extract_facts → priority_router) OK');
} catch(e) {
  fail('addConnection failed: ' + e.message + ' ' + e.stack);
}

try {
  editor.addConnection('priority_router', 'call_curator', 'output_1', 'input_1');
  pass('addConnection(priority_router → call_curator) OK');
} catch(e) {
  fail('addConnection(priority_router → call_curator) failed: ' + e.message);
}

try {
  editor.addConnection('call_curator', 'END', 'output_1', 'input_1');
  pass('addConnection(call_curator → END) OK');
} catch(e) {
  fail('addConnection(call_curator → END) failed: ' + e.message);
}

// ── Test 5: export() returns correct data ──
write('<hr><b>Test 5: export() fidelity</b>');

const exported = editor.export();
const exportedKeys = Object.keys(exported.drawflow.Home.data).sort();
if (exportedKeys.join(',') === 'END,call_curator,extract_facts,priority_router') {
  pass('export() keys are custom IDs: ' + exportedKeys.join(', '));
} else {
  fail('export() keys: ' + exportedKeys.join(', ') + ' (expected custom IDs)');
}

// ── Test 6: removeNodeId with custom ID ──
write('<hr><b>Test 6: removeNodeId with custom ID</b>');

try {
  editor.removeNodeId('node-END');
  pass('removeNodeId(node-END) OK');
  const afterRemoval = editor.drawflow.drawflow.Home.data['END'];
  if (afterRemoval === undefined) {
    pass('data["END"] removed correctly');
  } else {
    fail('data["END"] still exists after remove');
  }
} catch(e) {
  fail('removeNodeId(node-END) failed: ' + e.message);
}

// ── Test 7: palette addNode via addNodeImport ──
write('<hr><b>Test 7: palette addNode via addNodeImport</b>');

const paletteId = 'llm_worker_' + Date.now();
const paletteNode = {
  id: paletteId, name: paletteId,
  data: { id: paletteId, type: 'llm_worker', agent: 'test_agent' },
  class: '', html: '', typenode: false,
  inputs: { input_1: { connections: [] } },
  outputs: { output_1: { connections: [] } },
  pos_x: 300, pos_y: 400,
};

try {
  editor.drawflow.drawflow.Home.data[paletteId] = paletteNode;
  editor.addNodeImport(paletteNode, editor.precanvas);
  editor.dispatch('nodeCreated', paletteId);
  pass('addNodeImport + dispatch OK');

  const found = document.getElementById('node-' + paletteId);
  if (found) {
    pass('DOM #node-' + paletteId + ' exists');
  } else {
    fail('DOM #node-' + paletteId + ' NOT found');
  }

  const dataRef = editor.drawflow.drawflow.Home.data[paletteId];
  if (dataRef && dataRef.id === paletteId) {
    pass('data["' + paletteId + '"] accessible');
  } else {
    fail('data["' + paletteId + '"] NOT accessible');
  }
} catch(e) {
  fail('addNodeImport failed: ' + e.message + ' ' + (e.stack || ''));
}

// ── Summary ──
write('<hr><b>Test Complete</b>');
write('<span style="color:blue">All tests passed if no [FAIL] above</span>');
</script>
</body></html>
