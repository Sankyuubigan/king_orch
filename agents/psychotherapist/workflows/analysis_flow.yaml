name: Analysis Workflow

nodes:
  - id: check_reports
    type: system_condition
    action: get_missing_reports
    required:
      - soma_translator
      - destructor_detector
      - pattern_finder_by_double_bind
    namespace: "{{ namespace }}"

  - id: call_soma
    type: llm_worker
    agent: soma_translator
    namespace: "{{ namespace }}"

  - id: call_destructor
    type: llm_worker
    agent: destructor_detector
    namespace: "{{ namespace }}"

  - id: call_pattern
    type: llm_worker
    agent: pattern_finder_by_double_bind
    namespace: "{{ namespace }}"

edges:
  - from: check_reports
    to: call_soma
  - from: call_soma
    to: call_destructor
  - from: call_destructor
    to: call_pattern
  - from: call_pattern
    to: END
