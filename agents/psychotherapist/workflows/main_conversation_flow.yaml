name: Main Therapy Loop
visible: true

config:
  statuses:
    - id: greeting
      description: "Юзер просто поздоровался"
    - id: multiple_problems
      description: "Юзер вывалил кучу разных несвязанных проблем (каша)"
    - id: one_problem_incomplete
      description: "Юзер назвал одну проблему, но не хватает контекста, желания или адаптации"
    - id: ready_for_expose
      description: "Проблема ясна, все 3 пункта собраны, можно лечить"

nodes:
  - id: classify_intent
    type: llm_classifier
    statuses: "$ref config.statuses"
    input: "{{ user_message }}"

  - id: route
    type: switch
    input: "{{ nodes.classify_intent.output.status }}"
    cases:
      greeting: respond
      multiple_problems: triage
      one_problem_incomplete: collect_info
      ready_for_expose: check_analysis_done

  - id: respond
    type: llm_worker
    agent: therapist_communicator
    task: "Пользователь поздоровался. Поприветствуй его и спроси, с чем он хочет поработать."

  - id: collect_info
    type: llm_worker
    agent: therapist_communicator
    task: >
      Пользователь описал проблему, но не хватает данных.
      Собери недостающие пункты по Протоколу 3 пунктов:
      1. Контекст проблемы (подробное описание)
      2. Как клиент хочет, чтобы проблема решилась (жизнь без неё)
      3. Как клиент справляется сейчас (адаптация/компенсация)
      Недостающие пункты: {{ nodes.classify_intent.output.missing_points }}

  - id: triage
    type: sub_workflow
    workflow: triage_flow.yaml

  - id: check_analysis_done
    type: system_condition
    action: has_reports
    required:
      - pattern_finder_by_double_bind
      - destructor_detector
    namespace: main

  - id: run_analysis_if_needed
    type: sub_workflow
    workflow: analysis_flow.yaml
    namespace: main

  - id: start_datamining
    type: sub_workflow
    workflow: treatment_flow.yaml

  - id: aggregate_reports
    type: system_condition
    action: aggregate_reports
    required:
      - soma_translator
      - destructor_detector
      - pattern_finder_by_double_bind
      - neuro_reprogrammer
    namespace: main

  - id: present_results
    type: llm_worker
    agent: therapist_communicator
    task: >
      Лечение завершено в неймспейсе main.
      Вот отчёты всех агентов. Используй их чтобы объяснить клиенту ситуацию.

      Сводка агентов:
      {{ nodes.aggregate_reports.output.reports }}

      Переведи инструкцию от neuro_reprogrammer на простой бытовой язык.
      Используя отчёты soma_translator, destructor_detector, pattern_finder_by_double_bind,
      объясни клиенту что с ним происходило. НЕ используй технические термины.

edges:
  - from: classify_intent
    to: route
  - from: route
    case: greeting
    to: respond
  - from: route
    case: multiple_problems
    to: triage
  - from: route
    case: one_problem_incomplete
    to: collect_info
  - from: route
    case: ready_for_expose
    to: check_analysis_done
  - from: check_analysis_done
    condition: missing
    to: run_analysis_if_needed
  - from: check_analysis_done
    condition: present
    to: start_datamining
  - from: run_analysis_if_needed
    to: start_datamining
  - from: start_datamining
    to: aggregate_reports
  - from: aggregate_reports
    to: present_results
  - from: respond
    to: END
  - from: collect_info
    to: END
  - from: triage
    to: END
  - from: present_results
    to: END
