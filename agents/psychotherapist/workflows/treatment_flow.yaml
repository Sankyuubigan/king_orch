name: Treatment Workflow

nodes:
  - id: check_analysis
    type: system_condition
    action: has_reports
    required:
      - pattern_finder_by_double_bind
      - destructor_detector
    namespace: "{{ namespace }}"

  - id: ensure_analysis
    type: sub_workflow
    workflow: analysis_flow.yaml
    namespace: "{{ namespace }}"

  - id: check_reports
    type: system_condition
    action: get_missing_reports
    required:
      - neuro_reprogrammer
      - distiller_logos
    namespace: "{{ namespace }}"

  - id: call_neuro
    type: llm_worker
    agent: neuro_reprogrammer
    namespace: "{{ namespace }}"

  - id: call_distiller
    type: llm_worker
    agent: distiller_logos
    namespace: "{{ namespace }}"

  - id: present_results
    type: llm_worker
    agent: therapist_communicator
    task: >
      Лечение завершено в неймспейсе {{ namespace }}.
      Получи отчёты distiller_logos и neuro_reprogrammer через batch_get_agent_report.
      Выведи скрипт от distiller_logos слово в слово.
      Переведи инструкцию от neuro_reprogrammer на простой бытовой язык.
      Используя отчёты soma_translator, destructor_detector, pattern_finder_by_double_bind,
      объясни клиенту что с ним происходило. НЕ используй технические термины.

edges:
  - from: check_analysis
    condition: missing
    to: ensure_analysis
  - from: check_analysis
    condition: present
    to: check_reports
  - from: ensure_analysis
    to: check_reports
  - from: check_reports
    to: call_neuro
  - from: call_neuro
    to: call_distiller
  - from: call_distiller
    to: present_results
  - from: present_results
    to: END
