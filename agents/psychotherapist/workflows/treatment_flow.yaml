name: Treatment Workflow

nodes:
  - id: check_reports
    type: system_condition
    action: get_missing_reports
    required:
      - neuro_reprogrammer
    namespace: "{{ namespace }}"

  - id: call_neuro
    type: llm_worker
    agent: neuro_reprogrammer
    namespace: "{{ namespace }}"

edges:
  - from: check_reports
    to: call_neuro
  - from: call_neuro
    to: END
