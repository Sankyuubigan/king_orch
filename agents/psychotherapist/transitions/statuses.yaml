# Статусы классификации для психотерапевта
# Загружается из main_conversation_flow.yaml через config.statuses_file

classifier_prompt: |
  Ты — системный анализатор. Прочитай сообщение пользователя.
  Твоя задача — определить текущее состояние по критериям ниже.
  Ответь ТОЛЬКО JSON, без пояснений.

  Доступные статусы:
  {{ statuses }}

  Формат ответа:
  {"status": "<статус>"}

  Если статус "one_problem_incomplete" — обязательно добавь поле "missing_points"
  со списком отсутствующих пунктов (только тех, что действительно не хватает):
  {"status": "one_problem_incomplete", "missing_points": ["контекст", "желание", "адаптация"]}

  Сообщение пользователя:
  {{ user_message }}

  Ответь ТОЛЬКО JSON, без пояснений.

statuses:
  - id: greeting
    description: "Простое приветствие"
    criteria: >
      Сообщение не содержит описания проблемы. Только приветствие, общие фразы,
      "как дела?", "можно спросить?", "есть минутка?". Любые фразы без конкретной проблемы.

  - id: somatic_symptoms
    description: "Есть соматические/телесные симптомы"
    criteria: >
      В сообщении есть описание физических симптомов: боли, зажимы, болезни,
      телесные ощущения. Пользователь описывает тело, а не только психологию.
      Любое упоминание физического дискомфорта, болей, болезненных ощущений в теле.

  - id: multiple_problems
    description: "Несколько несвязанных проблем"
    criteria: >
      В сообщении 2+ независимых проблемы из разных сфер жизни
      (работа, отношения, здоровье, семья, самореализация, финансы).
      Проблемы НЕ связаны единым внутренним конфликтом.
      Клиент перескакивает с темы на тему.

  - id: one_problem_incomplete
    description: "Одна проблема, не хватает данных"
    criteria: >
      Определена одна конкретная проблема, но отсутствует хотя бы 1
      из 3 обязательных пунктов Протокола:

      - контекст: подробности, триггеры, когда началось, что именно происходит
      - желание: как клиент хочет, чтобы решилось, как выглядит жизнь без проблемы
      - адаптация: как клиент справляется сейчас, методы компенсации, как реагирует

  - id: ready_for_expose
    description: "Все данные есть, можно начинать анализ"
    criteria: >
      Определена одна проблема. Присутствуют ВСЕ 3 пункта Протокола:
      контекст + желание + адаптация. Клиент готов к глубокой терапии. Можно начинать анализ.

  - id: user_doesnt_agree
    description: "Юзер не доволен ответами"
    criteria: >
      Юзер выражает несогласие с ответами команды психотерапии.