# Факты для экстрактора
# Загружается из main_conversation_flow.yaml через config.facts_file

extractor_prompt: |
  Ты — системный анализатор. Прочитай сообщение пользователя.
  Определи, присутствуют ли в нем следующие факты/смыслы.
  Ответь ТОЛЬКО JSON-объектом, где ключ — ID факта, значение — true или false.

  Факты:
  {{ facts }}

  Сообщение пользователя:
  {{ user_message }}

  Ответь ТОЛЬКО JSON, без пояснений.

facts:
  - id: has_somatic
    criteria: "Есть телесные/соматические симптомы. Юзер описывает физическую боль, зажимы, болезни"

  - id: user_doesnt_agree
    criteria: "Пользователь не согласен с ответами команды психотерапии. Юзер не доволен ответами"

  - id: not_enough_data
    criteria: >
      Отсутствует хотя бы 1 из 3 обязательных пунктов Протокола:

      - контекст: подробности, триггеры, когда началось, что именно происходит
      - желание: как клиент хочет, чтобы решилось, как выглядит жизнь без проблемы
      - адаптация: как клиент справляется сейчас, методы компенсации, как реагирует
