# Факты для экстрактора
# Загружается из main_conversation_flow.yaml через config.facts_file

# Кастомный промпт (опционально — если не задан, используется базовый)
# extractor_prompt: ...

# Фазы процесса (опционально)
phases:
  - id: data_collection
    criteria: "Нет сигнала phase, либо последний signals phase сигнал = data_collection"

  - id: datamining
    criteria: "Последний signals phase сигнал = datamining"

  - id: treatment
    criteria: "Последний signals phase сигнал = treatment"

# Факты
facts:
  - id: has_somatic
    criteria: |
      TRUE если: пользователь жалуется на конкретную физическую боль или телесный симптом — "спина болит", "голова раскалывается", "мышцы зажаты", "колено стреляет", "живот крутит", "врач поставил диагноз", "температура", "кашель", "сыпь на коже".
      FALSE если: пользователь описывает только эмоциональные/психологические состояния — "тоскливо", "тревога", "апатия", "меланхолия", "потеря смысла", "плохое настроение", "ощущаю себя мертвым", "нет энергии", "депрессия", даже если использует телесные метафоры ("кошки скребут", "ноет на душе", "тяжесть на сердце"). Это эмоциональные симптомы, а не соматика.

  - id: grounding_dont_exist
    criteria: |
      Проверяет, дал ли юзер УЖЕ конкретный МЕНТАЛЬНЫЙ сценарий из своей жизни. Гроундер нужен, чтобы найти такой сценарий, если его нет.

      TRUE (сценария нет, гроундер НУЖЕН) — если юзер НЕ описал конкретную жизненную ситуацию со своей внутренней реакцией, а именно если запрос состоит ТОЛЬКО из одного или нескольких пунктов ниже:
      1. Только физические/телесные симптомы ("спазмы бедер", "болят зубы", "боль в пояснице", "слабая эмаль"). Физика — это вход для соматолога, а НЕ ментальный сценарий. Описание телесных симптомов НЕ считается заземлением.
      2. Только абстракции, диагнозы, философские рассуждения или жалобы на жизнь в целом ("я неудачник", "у меня прокрастинация", "все люди злые", "нет смысла").
      3. Только эмоции/состояния без привязки к конкретной жизненной ситуации ("тревога", "тоскливо", "апатия", "чувствую себя мертвым").

      FALSE (сценарий уже есть, гроундер НЕ нужен) — только если юзер САМ описал конкретную жизненную ситуацию (кто/где/когда) ВМЕСТЕ со своей внутренней ментальной реакцией или затыком в ней (например: "вчера начальник при всех унизил меня, я промолчал и всю ночь прокручивал это", "не могу подойти к девушке, замираю от страха отказа"). Ситуация без описания внутренней реакции, либо чистая физика/абстракция/эмоция — это НЕ сценарий, ставь TRUE.

  - id: user_doesnt_agree
    criteria: "Пользователь не согласен с ответами команды психотерапии. Юзер не доволен ответами"
