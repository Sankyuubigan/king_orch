name: Therapist
visible: true

config:
  facts_file: "facts.yaml"

nodes:
  # 1. Извлекаем ВСЕ факты из сообщения пользователя
  - id: extract_facts
    type: llm_fact_extractor
    input: "{{ user_message }}"

  # 2. Роутер на основе приоритетов фактов
  # Первый true факт определяет маршрут
  - id: priority_router
    type: switch
    input_object: "{{ nodes.extract_facts.output }}"
    cases_priority:
      - key: user_doesnt_agree
        to: call_curator
      - key: has_somatic
        to: call_soma_translator
      - key: not_enough_data
        to: extract_protocol_data
      - key: is_greeting
        to: respond_greeting
    default: freestyle

  # 3. Воркеры, пишущие сразу в чат (без синтеза)
  - id: call_curator
    type: llm_worker
    agent: curator
    output_type: message
    task: "Пользователь не согласен или сопротивляется. Ответь ему."

  - id: call_soma_translator
    type: llm_worker
    agent: soma_translator
    output_type: message
    task: "Пользователь описал боль. Дай ему расшифровку по НГМ."

  - id: respond_greeting
    type: llm_worker
    agent: liaison
    output_type: message
    task: "Поздоровайся и спроси, с чем будем работать."

  - id: freestyle
    type: llm_freeform
    input: "{{ user_message }}"

  # --- Блок работы с протоколом ---
  - id: extract_protocol_data
    type: llm_worker
    agent: protocol_extractor
    output_type: thought
    task: "Обнови статус протокола."

  - id: check_protocol
    type: system_condition
    action: check_protocol_state
    required: ["protocol_extractor"]

  - id: protocol_router
    type: switch
    input: "{{ nodes.check_protocol.output.status }}"
    cases:
      need_more_data: ask_missing
      ready: start_datamining

  - id: ask_missing
    type: llm_worker
    agent: liaison
    output_type: message
    task: "Нам не хватает: {{ nodes.check_protocol.output.missing_points }}. Спроси об этом."

  - id: start_datamining
    type: sub_workflow
    workflow: treatment_flow.yaml

  - id: output_raw_datamining
    type: system_condition
    action: aggregate_and_output
    required: ["neuro_reprogrammer"]

edges:
  - from: extract_facts
    to: priority_router

  # Переходы от priority_router заданы внутри (cases_priority + default)
  - from: call_curator
    to: END
  - from: call_soma_translator
    to: END
  - from: respond_greeting
    to: END
  - from: freestyle
    to: END

  # Блок протокола
  - from: extract_protocol_data
    to: check_protocol
  - from: check_protocol
    to: protocol_router
  - from: protocol_router
    case: need_more_data
    to: ask_missing
  - from: protocol_router
    case: ready
    to: start_datamining
  - from: ask_missing
    to: END

  # Вывод без синтеза
  - from: start_datamining
    to: output_raw_datamining
  - from: output_raw_datamining
    to: END
