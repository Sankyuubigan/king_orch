name: Therapist

visible: true

config:
  facts_file: facts.yaml

nodes:
  - id: extract_facts
    type: llm_fact_extractor
    input: |
      User: {{ user_message }}
      Session signals: {{ signals }}
    ui_pos:
      y: 509
      x: -611
  - id: priority_router
    type: switch
    input_object: '{{ nodes.extract_facts.output }}'
    switch_field: phase
    cases_priority:
      - key: data_collection
        to: condition_check_1781669155440
      - key: datamining
        to: call_pattern_finder
    default: condition_check_1781669155440
    ui_pos:
      y: 480
      x: -253
  - id: call_curator
    type: llm_worker
    agent: curator
    task: Пользователь не согласен или сопротивляется. Ответь ему.
    output_type: message
    ui_pos:
      y: 372
      x: 1531
  - id: call_soma_translator
    type: llm_worker
    agent: soma_translator
    task: Пользователь описал боль. Дай ему расшифровку по НГМ.
    ui_pos:
      y: 329
      x: 480
  - id: collect_info
    type: llm_worker
    agent: liaison
    task: |
      Пользователь описал проблему, но не хватает данных. Собери недостающие пункты по Протоколу 3 пунктов: 1. Контекст проблемы (подробное описание) 2. Как клиент хочет, чтобы проблема решилась (жизнь без неё) 3. Как клиент справляется сейчас (адаптация/компенсация)
    output_type: message
    ui_pos:
      y: 40
      x: 12
    disabled: true
  - id: call_grounder
    type: llm_worker
    agent: grounder
    output_type: message
    inject_reports:
      - soma_translator
    ui_pos:
      y: 176
      x: 885
  - id: call_validator
    type: llm_worker
    agent: validator
    ui_pos:
      y: 330
      x: 898
  - id: route_validator_signal
    type: signal_router
    signal_name: validator_report
    field: verdict
    cases_priority:
      - key: ДАННЫХ ДОСТАТОЧНО
        to: call_pattern_finder
      - key: КРАШ-ТЕСТ НЕОБХОДИМ
        to: call_curator
    ui_pos:
      y: 166
      x: 1236
  - id: call_destructor_finder
    type: llm_worker
    agent: destructor_detector
    inject_reports:
      - soma_translator
      - pattern_finder_by_floors
    ui_pos:
      y: 596
      x: 2540
  - id: call_pattern_finder
    type: llm_worker
    agent: pattern_finder_by_floors
    inject_reports:
      - soma_translator
    ui_pos:
      y: 491
      x: 2270
  - id: call_healer
    type: llm_worker
    agent: neuro_reprogrammer
    output_type: message
    inject_reports:
      - pattern_finder_by_floors
      - destructor_detector
    ui_pos:
      y: 599
      x: 2811
  - id: condition_check_1781669155440
    type: condition_check
    field: has_somatic
    sequential_to: condition_check_1781669297812
    true_to: call_soma_translator
    ui_pos:
      x: 184
      y: 243
  - id: condition_check_1781669297812
    type: condition_check
    field: grounding_dont_exist
    true_to: call_grounder
    false_to: call_validator
    ui_pos:
      y: 85
      x: 546

edges:
  - from: extract_facts
    to: priority_router
  - from: call_validator
    to: route_validator_signal
  - from: call_pattern_finder
    to: call_destructor_finder
  - from: call_destructor_finder
    to: call_healer
