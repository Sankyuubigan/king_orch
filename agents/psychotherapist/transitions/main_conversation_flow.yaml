name: Therapist

visible: true

config:
  facts_file: facts.yaml

nodes:
  - id: extract_facts
    type: llm_fact_extractor
    input: '{{ user_message }}'
    ui_pos:
      y: 130
      x: 100
  - id: priority_router
    type: switch
    input_object: '{{ nodes.extract_facts.output }}'
    cases_priority:
      - key: user_doesnt_agree
        to: call_curator
      - key: has_somatic
        to: call_soma_translator
      - key: not_enough_data
        to: collect_info
      - key: grounding_dont_exist
        to: call_grounder
    default: call_validator
    ui_pos:
      y: 130
      x: 420
  - id: call_curator
    type: llm_worker
    agent: curator
    task: Пользователь не согласен или сопротивляется. Ответь ему.
    output_type: message
    ui_pos:
      y: -150
      x: 740
  - id: call_soma_translator
    type: llm_worker
    agent: soma_translator
    task: Пользователь описал боль. Дай ему расшифровку по НГМ.
    ui_pos:
      x: 740
      y: -10
  - id: collect_info
    type: llm_worker
    agent: liaison
    task: |
      Пользователь описал проблему, но не хватает данных. Собери недостающие пункты по Протоколу 3 пунктов: 1. Контекст проблемы (подробное описание) 2. Как клиент хочет, чтобы проблема решилась (жизнь без неё) 3. Как клиент справляется сейчас (адаптация/компенсация)
    ui_pos:
      x: 776
      y: 158
  - id: start_datamining
    type: sub_workflow
    workflow: treatment_flow.yaml
    ui_pos:
      x: 1700
      y: 200
  - id: output_raw_datamining
    type: system_condition
    action: aggregate_and_output
    required:
      - neuro_reprogrammer
    ui_pos:
      x: 2020
      y: 130
  - id: call_grounder
    type: llm_worker
    agent: grounder
    ui_pos:
      x: 777
      y: 327
  - id: call_validator
    type: llm_worker
    agent: validator
    ui_pos:
      y: 483
      x: 774

edges:
  - from: extract_facts
    to: priority_router
  - from: start_datamining
    to: output_raw_datamining
