name: Therapist

visible: true

config:
  facts_file: facts.yaml

nodes:
  - id: extract_facts
    type: llm_fact_extractor
    input: |
      User: {{ user_message }}
      Session signals: {{ signals }}
    ui_pos:
      y: 56
      x: -215
  - id: priority_router
    type: switch
    input_object: '{{ nodes.extract_facts.output }}'
    switch_field: phase
    cases_priority:
      - key: data_collection
        to: facts_router
      - key: datamining
        to: call_destructor_finder
    default: facts_router
    ui_pos:
      x: 70
      y: 77
  - id: facts_router
    type: switch
    input_object: '{{ nodes.extract_facts.output }}'
    cases_priority:
      - key: user_doesnt_agree
        to: call_curator
      - key: has_somatic
        to: call_soma_translator
      - key: not_enough_data
        to: collect_info
      - key: grounding_dont_exist
        to: call_grounder
    default: call_validator
    ui_pos:
      x: 407
      y: -361
  - id: call_curator
    type: llm_worker
    agent: curator
    task: Пользователь не согласен или сопротивляется. Ответь ему.
    output_type: message
    ui_pos:
      x: 843
      y: -998
  - id: call_soma_translator
    type: llm_worker
    agent: soma_translator
    task: Пользователь описал боль. Дай ему расшифровку по НГМ.
    ui_pos:
      y: -515
      x: 813
  - id: collect_info
    type: llm_worker
    agent: liaison
    task: |
      Пользователь описал проблему, но не хватает данных. Собери недостающие пункты по Протоколу 3 пунктов: 1. Контекст проблемы (подробное описание) 2. Как клиент хочет, чтобы проблема решилась (жизнь без неё) 3. Как клиент справляется сейчас (адаптация/компенсация)
    output_type: message
    ui_pos:
      y: -415
      x: 777
  - id: call_grounder
    type: llm_worker
    agent: grounder
    output_type: message
    ui_pos:
      x: 1228
      y: -348
  - id: call_validator
    type: llm_worker
    agent: validator
    ui_pos:
      y: -184
      x: 820
  - id: route_validator_signal
    type: signal_router
    signal_name: validator_report
    field: verdict
    cases_priority:
      - key: ДАННЫХ ДОСТАТОЧНО
        to: call_destructor_finder
      - key: КРАШ-ТЕСТ НЕОБХОДИМ
        to: call_curator
    ui_pos:
      x: 1542
      y: -245
  - id: call_destructor_finder
    type: llm_worker
    agent: destructor_detector
    ui_pos:
      y: 55
      x: 1672
  - id: call_pattern_finder
    type: llm_worker
    agent: pattern_finder_by_floors
    ui_pos:
      x: 1995
      y: 171
  - id: call_healer
    type: llm_worker
    agent: neuro_reprogrammer
    output_type: message
    ui_pos:
      y: 60
      x: 2330

edges:
  - from: extract_facts
    to: priority_router
  - from: call_soma_translator
    to: call_grounder
  - from: call_validator
    to: route_validator_signal
  - from: call_destructor_finder
    to: call_pattern_finder
  - from: call_pattern_finder
    to: call_healer
