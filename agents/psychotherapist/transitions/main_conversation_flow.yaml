name: Therapist
visible: true

config:
  statuses_file: "statuses.yaml"

nodes:
  - id: classify_intent
    type: llm_classifier
    input: "{{ user_message }}"

  - id: route
    type: switch
    input: "{{ nodes.classify_intent.output.status }}"
    default: freestyle
    cases:
      greeting: respond
      somatic_symptoms: call_soma_aux
      one_problem_incomplete: collect_info
      ready_for_expose: check_analysis_all_done
      user_doesnt_agree: call_curator

  - id: freestyle
    type: llm_freeform
    input: "{{ user_message }}"

  - id: respond
    type: llm_worker
    agent: liaison
    task: "Пользователь поздоровался. Поприветствуй его и спроси, с чем он хочет поработать."

  - id: collect_info
    type: llm_worker
    agent: liaison
    task: >
      Пользователь описал проблему, но не хватает данных.
      Собери недостающие пункты по Протоколу 3 пунктов:
      1. Контекст проблемы (подробное описание)
      2. Как клиент хочет, чтобы проблема решилась (жизнь без неё)
      3. Как клиент справляется сейчас (адаптация/компенсация)
      Недостающие пункты: {{ nodes.classify_intent.output.missing_points }}

  - id: call_soma_aux
    type: llm_worker
    agent: soma_translator
    namespace: main
    task: >
      Пользователь описывает физические симптомы.
      Используя базу знаний 10 сегментов тела и НГМ,
      напиши пользователю вспомогательную информацию,
      чтобы помочь ему раскрыть его проблему.
      Пиши простым языком, будто пользователю 15 лет.

  - id: call_curator
    type: llm_worker
    agent: curator
    task: >
      Пользователь не согласен с ответами команды психотерапии.
      Используй свой алгоритм проекций, чтобы выяснить истинную причину
      несогласия и помочь пользователю раскрыть проблему.

  - id: check_analysis_all_done
    type: system_condition
    action: has_reports
    required:
      - soma_translator
      - destructor_detector
      - pattern_finder_by_double_bind
    namespace: main

  - id: check_reports
    type: system_condition
    action: get_missing_reports
    required:
      - soma_translator
      - destructor_detector
      - pattern_finder_by_double_bind
    namespace: main

  - id: call_soma
    type: llm_worker
    agent: soma_translator
    namespace: main
    task: >
      Пользователь описывает физические симптомы.
      Используя базу знаний 10 сегментов тела и НГМ,
      напиши пользователю вспомогательную информацию,
      чтобы помочь ему раскрыть его проблему.
      Пиши простым языком, будто пользователю 15 лет.

  - id: call_destructor
    type: llm_worker
    agent: destructor_detector
    namespace: main

  - id: call_pattern
    type: llm_worker
    agent: pattern_finder_by_double_bind
    namespace: main

  - id: start_datamining
    type: sub_workflow
    workflow: treatment_flow.yaml

  - id: aggregate_reports
    type: system_condition
    action: aggregate_reports
    required:
      - soma_translator
      - destructor_detector
      - pattern_finder_by_double_bind
      - neuro_reprogrammer
    namespace: main

  - id: present_results
    type: llm_worker
    agent: liaison
    task: >
      Лечение завершено в неймспейсе main.
      Вот отчёты всех агентов. Используй их чтобы объяснить клиенту ситуацию.

      Сводка агентов:
      {{ nodes.aggregate_reports.output.reports }}

      Переведи инструкцию от neuro_reprogrammer на простой бытовой язык.
      Используя отчёты soma_translator, destructor_detector, pattern_finder_by_double_bind,
      объясни клиенту что с ним происходило. НЕ используй технические термины.

edges:
  - from: classify_intent
    to: route
  - from: route
    case: greeting
    to: respond
  - from: route
    case: somatic_symptoms
    to: call_soma_aux
  - from: route
    case: one_problem_incomplete
    to: collect_info
  - from: route
    case: ready_for_expose
    to: check_analysis_all_done
  - from: route
    case: user_doesnt_agree
    to: call_curator

  - from: check_analysis_all_done
    condition: present
    to: start_datamining
  - from: check_analysis_all_done
    condition: missing
    to: check_reports
  - from: check_reports
    to: call_soma
  - from: call_soma
    to: call_destructor
  - from: call_destructor
    to: call_pattern
  - from: call_pattern
    to: start_datamining

  - from: start_datamining
    to: aggregate_reports
  - from: aggregate_reports
    to: present_results

  - from: freestyle
    to: END
  - from: respond
    to: END
  - from: collect_info
    to: END
  - from: call_soma_aux
    to: END
  - from: call_curator
    to: END
  - from: present_results
    to: END
