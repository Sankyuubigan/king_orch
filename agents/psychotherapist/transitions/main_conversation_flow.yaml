name: Психотерапевт

visible: true

config:
  facts_file: facts.yaml

nodes:
  - id: extract_facts
    type: llm_fact_extractor
    input: |
      User: {{ user_message }}
      Session signals: {{ signals }}
    ui_pos:
      x: -611
      y: 509
  - id: priority_router
    type: switch
    input_object: '{{ nodes.extract_facts.output }}'
    switch_field: phase
    cases_priority:
      - key: data_collection
        to: condition_check_1781669155440
      - key: datamining
        to: call_pattern_finder
    default: condition_check_1781669155440
    ui_pos:
      x: -253
      y: 480
  - id: call_curator
    type: llm_worker
    agent: curator
    task: Пользователь не согласен или сопротивляется. Ответь ему.
    output_type: message
    ui_pos:
      y: -30
      x: 2235
  - id: call_soma_translator
    type: llm_worker
    agent: soma_translator
    task: Пользователь описал боль. Дай ему расшифровку по НГМ.
    ui_pos:
      y: 329
      x: 480
  - id: collect_info
    type: llm_worker
    agent: liaison
    task: |
      Пользователь описал проблему, но не хватает данных. Собери недостающие пункты по Протоколу 3 пунктов: 1. Контекст проблемы (подробное описание) 2. Как клиент хочет, чтобы проблема решилась (жизнь без неё) 3. Как клиент справляется сейчас (адаптация/компенсация)
    output_type: message
    ui_pos:
      x: 105
      y: -545
    disabled: true
  - id: call_grounder
    type: llm_worker
    agent: grounder
    output_type: message
    inject_reports:
      - soma_translator
    ui_pos:
      x: 896
      y: -537
  - id: call_validator
    type: llm_worker
    agent: validator
    ui_pos:
      y: 3
      x: 1575
  - id: check_validator_signal
    type: signal_router
    signal_name: validator_report
    field: verdict
    cases_priority:
      - key: ДАННЫХ ДОСТАТОЧНО
        to: call_pattern_finder
      - key: КРАШ-ТЕСТ НЕОБХОДИМ
        to: call_curator
    ui_pos:
      x: 1913
      y: -161
  - id: call_destructor_finder
    type: llm_worker
    agent: destructor_detector
    task: |
      Проанализируй отчёты коллег и определи Деструктор (Этаж -2).
      Найди: Идол, Угрозу, Деструктор, Запрет удовольствия, Парадоксальную петлю.
      Сохрани diagnostic_report через инструмент emit_signal.
      После отправки сигнала ответь target: reply с кратким итогом.
    inject_reports:
      - soma_translator
      - pattern_finder_by_floors
    ui_pos:
      y: 596
      x: 2540
    disabled: true
  - id: call_pattern_finder
    type: llm_worker
    agent: pattern_finder_by_floors
    inject_reports:
      - soma_translator
    ui_pos:
      x: 2270
      y: 491
  - id: call_healer
    type: llm_worker
    agent: neuro_reprogrammer
    task: |
      Из отчёта pattern_finder_by_floors возьми номер типа паттерна.
      Затем выполни ШАГ 2 — прочитай описание этого паттерна в базе знаний инструментом ReadSection.
      После этого переведи паттерн на контекст проблемы пользователя.
    output_type: message
    inject_reports:
      - pattern_finder_by_floors
      - destructor_detector
    ui_pos:
      x: 2811
      y: 599
  - id: check_somatic
    type: condition_check
    field: has_somatic
    sequential_to: llm_worker_1782103106237
    true_to: call_soma_translator
    ui_pos:
      y: 243
      x: 184
  - id: check_grounding
    type: condition_check
    field: grounding_dont_exist
    true_to: call_grounder
    false_to: call_validator
    ui_pos:
      x: 590
      y: -592
  - id: call_cluster_checker
    type: llm_worker
    agent: cluster_checker
    ui_pos:
      y: 28
      x: 430
  - id: check_cluster_signal
    type: signal_router
    signal_name: cluster_checker
    cases_priority:
      - key: Конкретная проблема
        to: ''
      - key: Кластер
        to: llm_worker_1782103516271
    ui_pos:
      x: 685
      y: 18
  - id: call_decomposer
    type: llm_worker
    agent: decomposer
    ui_pos:
      y: 107
      x: 936
  - id: synchronize_with_user
    type: llm_worker
    agent: synchronizer
    ui_pos:
      y: 116
      x: 1187

edges:
  - from: extract_facts
    to: priority_router
  - from: route_validator_signal
    to: call_curator
  - from: condition_check_1781669155440
    to: call_soma_translator
  - from: condition_check_1781669297812
    to: call_grounder
  - from: condition_check_1781669297812
    to: call_validator
  - from: call_validator
    to: route_validator_signal
  - from: call_pattern_finder
    to: call_destructor_finder
  - from: route_validator_signal
    to: call_pattern_finder
  - from: call_destructor_finder
    to: call_healer
  - from: condition_check_1781669155440
    to: llm_worker_1782103106237
  - from: llm_worker_1782103106237
    to: signal_router_1782103260985
  - from: signal_router_1782103260985
    to: llm_worker_1782103516271
  - from: llm_worker_1782103516271
    to: llm_worker_1782103918900
